app:
  name: Yet Bota - Content Service
  version: 0.0.1
cors:
  hosts:
    - ${corsHosts}
debug: ${debug}
rest:
  idle_timeout: 60
  port: 9966
  read_timeout: 15
  write_timeout: 15
jwt:
  algorithm: HS256
  access_token:
    expiration: ${jwtAccessTokenExpiration}
    secret: ${jwtAccessTokenSecret}
  refresh_token:
    expiration: ${jwtRefreshTokenExpiration}
    secret: ${jwtRefreshTokenSecret}
database:
  db: ${postgresDB}
  host: ${postgresHost}
  password: ${postgresPassword}
  port: ${postgresPort}
  user: ${postgresUser}
  sslmode: ${postgresSslMode}
redis:
  address: ${redisAddress}
  password: ${redisPassword}
  db: 0
  pool_size: 10
  min_idle_conns: 2
  max_idle_conns: 5
  max_retries: 3
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3
  pool_timeout: 5
  conn_max_idle_time: 300
  conn_max_lifetime: 3600
  tls: false
cloudinary:
  cloud_name: ${cloudinaryCloudName}
  api_key: ${cloudinaryAPIKey}
  api_secret: ${cloudinaryAPISecret}
  folder: content
identity_service:
  base_url: ${identityServiceUrl}
  timeout_sec: 10
ai_service:
  base_url: ${aiServiceUrl}
  timeout_sec: 10
internal:
  service_token: ${internalServiceToken}
rabbitmq:
  url: ${rabbitmqUrl}
feed:
  half_life_hours: 72
  feed_size: 200
  cold_start_n: 50
  score_change_delta: 0.05
  new_post_seed_score: 0.05
  seed_bonus: 1.0
  q_scale: 100.0
  epoch: 1735689600
  min_feed_score: -10.0
  score_ttl_hours: 18
  stale_limit: 50
  refill_threshold: 50
  max_follower_depth: 2
  max_sim_depth: 2
  fan_out_limit: 1000
  seen_cache_ttl: 86400
  celebrity_threshold: 100000
  max_celebrity_feed_size: 500
author_rating:
  stabilizing_window_hours: 48
  consumer_group: scoring-group
  poll_interval_sec: 30
  batch_size: 100
  continue_after_iter: 500
  badges:
    - name: contributor
      min_score: 1600
    - name: trusted_voice
      min_score: 1800
    - name: expert
      min_score: 2000
    - name: master
      min_score: 2200
    - name: grandmaster
      min_score: 2400
moderation:
  auto_hide_threshold: 5
  rate_limit_max: 10
  rate_limit_window_sec: 3600
