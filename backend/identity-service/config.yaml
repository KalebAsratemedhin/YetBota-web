app:
  name: Yet Bota - Identity Service
  version: 0.0.1
cors:
  hosts:
    - ${corsHosts}
debug: ${debug}
rest:
  idle_timeout: 60
  port: 6699
  read_timeout: 15
  write_timeout: 15
jwt:
  algorithm: HS256
  access_token:
    expiration: ${jwtAccessTokenExpiration}
    secret: ${jwtAccessTokenSecret}
  refresh_token:
    expiration: ${jwtRefreshTokenExpiration}
    secret: ${jwtRefreshTokenSecret}
database:
  db: ${postgresDB}
  host: ${postgresHost}
  password: ${postgresPassword}
  port: ${postgresPort}
  user: ${postgresUser}
  sslmode: ${postgresSslMode}
redis:
  address: ${redisAddress}
  password: ${redisPassword}
  poolTimeout: ${redisPoolTimeout}
  idleTimeout: ${redisIdleTimeout}
  readTimeout: ${redisReadTimeout}
  writeTimeout: ${redisWriteTimeout}
cloudinary:
  cloud_name: ${cloudinaryCloudName}
  api_key: ${cloudinaryAPIKey}
  api_secret: ${cloudinaryAPISecret}
  folder: identity
neo4j:
  uri: ${neo4jURI}
  username: ${neo4jUsername}
  password: ${neo4jPassword}
internal:
  service_token: ${internalServiceToken}
