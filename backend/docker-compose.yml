# Local infrastructure: Temporal, Neo4j, Redis.
# Postgres (Neon) and Weaviate are external — configure via .env.
services:
  redis:
    image: redis:7.4-alpine
    container_name: yetbota-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: yetbota-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${neo4jUsername:-neo4j}/${neo4jPassword:-neo4jpass}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    container_name: yetbota-temporal
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      DB: postgres12
      DB_PORT: ${postgresPort:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PWD}
      POSTGRES_SEEDS: ${POSTGRES_SEEDS}
      SKIP_DB_CREATE: "false"
      SKIP_DEFAULT_NAMESPACE_CREATION: "false"
    depends_on:
      redis:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: yetbota-temporal-ui
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

volumes:
  redis_data:
  neo4j_data:
