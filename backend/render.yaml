services:
  - type: web
    name: yetbota-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: postgresHost
        sync: false
      - key: postgresPort
        value: "5432"
      - key: postgresUser
        sync: false
      - key: postgresPassword
        sync: false
      - key: postgresDB
        sync: false
      - key: redisAddress
        fromService:
          name: yetbota-redis
          type: pserv
          property: hostport
      - key: redisPassword
        fromService:
          name: yetbota-redis
          type: pserv
          envVarKey: REDIS_PASSWORD
      - key: neo4jURI
        sync: false
      - key: neo4jUsername
        value: neo4j
      - key: neo4jPassword
        fromService:
          name: yetbota-neo4j
          type: pserv
          envVarKey: NEO4J_PASSWORD
      - key: temporalHost
        fromService:
          name: yetbota-temporal
          type: pserv
          property: hostport
      - key: temporalNamespace
        value: default
      - key: weaviateUrl
        sync: false
      - key: weaviateApiKey
        sync: false
      - key: geminiApiKey
        sync: false
      - key: jwtAccessTokenSecret
        generateValue: true
      - key: jwtRefreshTokenSecret
        generateValue: true
      - key: jwtAccessTokenExpiration
        value: "3600"
      - key: jwtRefreshTokenExpiration
        value: "604800"
      - key: cloudinaryCloudName
        sync: false
      - key: cloudinaryAPIKey
        sync: false
      - key: cloudinaryAPISecret
        sync: false
      - key: corsHosts
        sync: false
      - key: debug
        value: "false"
      - key: firebaseProjectID
        sync: false
      - key: firebaseClientEmail
        sync: false
      - key: firebasePrivateKey
        sync: false
      - key: redisPoolTimeout
        value: 4s
      - key: redisIdleTimeout
        value: 5m
      - key: redisReadTimeout
        value: 3s
      - key: redisWriteTimeout
        value: 3s

  - type: pserv
    name: yetbota-redis
    runtime: docker
    dockerfilePath: ./deploy/redis/Dockerfile
    dockerContext: ./deploy/redis
    envVars:
      - key: REDIS_PASSWORD
        generateValue: true

  - type: pserv
    name: yetbota-neo4j
    runtime: docker
    dockerfilePath: ./deploy/neo4j/Dockerfile
    dockerContext: ./deploy/neo4j
    envVars:
      - key: NEO4J_PASSWORD
        generateValue: true

  - type: pserv
    name: yetbota-temporal
    runtime: docker
    dockerfilePath: ./deploy/temporal/Dockerfile
    dockerContext: ./deploy/temporal
    envVars:
      - key: POSTGRES_SEEDS
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PWD
        sync: false
      - key: DB_PORT
        value: "5432"
